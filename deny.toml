# cargo-deny policy for the Chordia library server.
# Docs: https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[advisories]
# RUSTSEC advisories accepted after review. All are transitive and have no fixed release.
ignore = [
  # rsa — Marvin timing side-channel (RUSTSEC-2023-0071). Reachable only via jsonwebtoken. Chordia
  # signs and verifies all tokens with EdDSA (Ed25519) and never performs RSA private-key
  # operations, so the timing oracle is not in our threat model. No patched release exists yet.
  "RUSTSEC-2023-0071",
  # paste — unmaintained, no vulnerability (RUSTSEC-2024-0436). Transitive via lofty (audio tags).
  "RUSTSEC-2024-0436",
  # rustls-pemfile — unmaintained, no vulnerability (RUSTSEC-2025-0134); the code moved into
  # rustls-pki-types. Transitive via axum-server / rustls.
  "RUSTSEC-2025-0134",
]

[licenses]
# Permissive licenses accepted across the dependency tree. Add to this list as new deps appear.
allow = [
  "0BSD",
  "AGPL-3.0-or-later",          # Chordia's own crates (chordia-library, chordia-contracts)
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-1-Clause",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "LGPL-2.1-or-later",          # weak copyleft, compatible with the AGPL project
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.8
